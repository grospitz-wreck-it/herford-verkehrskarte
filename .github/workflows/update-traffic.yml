name: Build Traffic Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Build traffic file
        run: |
          python scripts/build_traffic.py

      - name: Commit updated data
        run: |
          git config --global user.name "traffic-bot"
          git config --global user.email "traffic-bot@users.noreply.github.com"
          git add data/traffic.geojson
          git commit -m "update traffic data" || echo "no changes"
          git push
