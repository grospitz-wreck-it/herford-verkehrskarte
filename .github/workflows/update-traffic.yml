name: Build Traffic Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Fetch Autobahn data
        run: |
          curl https://verkehr.autobahn.de/o/autobahn > autobahn.json

      - name: Convert to GeoJSON
        run: |
          echo '{"type":"FeatureCollection","features":[]}' > data/traffic.geojson

      - name: Commit data
        run: |
          git config --global user.name "traffic-bot"
          git config --global user.email "traffic-bot@users.noreply.github.com"
          git add data/traffic.geojson
          git commit -m "update traffic data" || echo "no changes"
          git push
