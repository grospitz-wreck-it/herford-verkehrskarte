name: Update traffic

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests feedparser

      - run: python scripts/build_traffic.py

      - run: python scripts/build_police.py

      - run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/*.json
          git commit -m "update traffic data" || echo "no change"
          git push
