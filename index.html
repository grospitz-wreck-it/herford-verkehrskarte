<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Verkehrsinfos im Kreis Herford</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f5f5f5;
}

.header{
background:white;
border-bottom:3px solid #c4001a;
padding:14px;
font-size:18px;
font-weight:bold;
}

.ticker{
background:#111;
color:white;
padding:8px;
font-size:14px;
overflow:hidden;
white-space:nowrap;
}

.ticker span{
display:inline-block;
padding-left:100%;
animation:ticker 35s linear infinite;
}

@keyframes ticker{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

#map{
height:84vh;
width:100%;
}

.emoji-marker{
font-size:30px;
text-align:center;
}

</style>

</head>

<body>

<div class="header">
Verkehrsinfos im Kreis Herford
</div>

<div class="ticker">
<span id="tickerText">Lade aktuelle Verkehrsmeldungen…</span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>

// Karte starten
const map = L.map("map").setView([52.114,8.673],11)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{ attribution:"© OpenStreetMap" }
).addTo(map)


// Cluster Layer
const constructionLayer=L.markerClusterGroup()
const accidentLayer=L.markerClusterGroup()
const warningLayer=L.markerClusterGroup()

map.addLayer(constructionLayer)
map.addLayer(accidentLayer)
map.addLayer(warningLayer)

let kreis


function emojiIcon(e){

return L.divIcon({
className:"emoji-marker",
html:e,
iconSize:[30,30],
iconAnchor:[15,15]
})

}


// Kreis laden
fetch("data/kreis-herford.geojson")
.then(r=>r.json())
.then(data=>{

kreis=data.features[0]

const border=L.geoJSON(data,{
style:{
color:"#c4001a",
weight:3,
fill:false
}
}).addTo(map)

map.fitBounds(border.getBounds())

loadTraffic()

loadOSM()

})



// prüfen ob Punkt im Kreis
function insideKreis(lat,lon){

const pt=turf.point([lon,lat])

return turf.booleanPointInPolygon(pt,kreis)

}



// Marker hinzufügen
function addMarker(layer,lat,lon,emoji,text){

if(!insideKreis(lat,lon)) return

const marker=L.marker([lat,lon],{
icon:emojiIcon(emoji)
})

marker.bindPopup(text)

layer.addLayer(marker)

}



// eigene Verkehrsdaten
function loadTraffic(){

fetch("data/traffic.json")
.then(r=>r.json())
.then(data=>{

let ticker=[]

data.features.forEach(f=>{

const lat=f.geometry.coordinates[1]
const lon=f.geometry.coordinates[0]

const text=f.properties.title
const type=f.properties.type

ticker.push(text)

if(type==="construction")
addMarker(constructionLayer,lat,lon,"🚧",text)

else if(type==="accident")
addMarker(accidentLayer,lat,lon,"🚓",text)

else
addMarker(warningLayer,lat,lon,"⚠️",text)

})

document.getElementById("tickerText").innerText=ticker.join(" • ")

})

}



// OSM Baustellen
function loadOSM(){

const query=`

[out:json][timeout:25];

(
node["highway"="construction"](52.05,8.45,52.25,8.85);
way["highway"="construction"](52.05,8.45,52.25,8.85);
);

out center;

`

fetch("https://overpass-api.de/api/interpreter",{
method:"POST",
body:query
})
.then(r=>r.json())
.then(data=>{

data.elements.forEach(el=>{

let lat,lon

if(el.lat){
lat=el.lat
lon=el.lon
}

if(el.center){
lat=el.center.lat
lon=el.center.lon
}

addMarker(
constructionLayer,
lat,
lon,
"🚧",
"Baustelle (OpenStreetMap)"
)

})

})

}



// Layer Control
L.control.layers(null,{
"🚧 Baustellen":constructionLayer,
"🚓 Unfälle":accidentLayer,
"⚠️ Gefahren":warningLayer
}).addTo(map)

</script>

</body>
</html>
