```html
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Verkehrskarte</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>

html,body{
margin:0;
padding:0;
}

#map{
height:100vh;
width:100%;
}

.emoji-marker{
font-size:34px;
text-align:center;
line-height:34px;
}

</style>

</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

// Karte starten
const map = L.map('map').setView([52.52,13.405],12)

// Basiskarte
L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ attribution:'© OpenStreetMap' }
).addTo(map)


// Emoji Icon Generator
function emojiIcon(emoji){
return L.divIcon({
className:'emoji-marker',
html:emoji,
iconSize:[36,36],
iconAnchor:[18,18]
})
}


// Layer Gruppen
const policeLayer = L.markerClusterGroup()
const constructionLayer = L.markerClusterGroup()
const warningLayer = L.markerClusterGroup()
const trafficLayer = L.markerClusterGroup()


// Marker hinzufügen
function addMarker(layer, lat, lon, emoji, text){

const marker = L.marker([lat,lon],{
icon:emojiIcon(emoji)
})

marker.bindPopup(text)

layer.addLayer(marker)

}


// Beispiel Daten
addMarker(policeLayer,52.52,13.405,"🚓","Polizei")
addMarker(policeLayer,52.518,13.39,"🚓","Polizeikontrolle")

addMarker(constructionLayer,52.525,13.41,"🚧","Baustelle")

addMarker(warningLayer,52.517,13.43,"⚠️","Gefahrstelle")

addMarker(trafficLayer,52.53,13.42,"🚗","Stau")


// Layer zur Karte
policeLayer.addTo(map)
constructionLayer.addTo(map)
warningLayer.addTo(map)
trafficLayer.addTo(map)


// Layer Control
const overlayMaps = {
"🚓 Polizei": policeLayer,
"🚧 Baustellen": constructionLayer,
"⚠️ Gefahren": warningLayer,
"🚗 Stau": trafficLayer
}

L.control.layers(null, overlayMaps).addTo(map)

</script>

</body>
</html>
```
