<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Karte Test</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0}
#map{height:100vh}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([52.114,8.673],11);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{attribution:'© OpenStreetMap'}
).addTo(map);

L.marker([52.114,8.673])
.addTo(map)
.bindPopup("Herford");

</script>

</body>
</html>
