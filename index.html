<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Verkehr im Kreis Herford</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
}

#map{
height:100vh;
}

.label-gemeinde{
background:white;
border:1px solid #ccc;
padding:2px 6px;
font-size:12px;
font-weight:bold;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// Karte starten

var map = L.map('map').setView([52.114,8.673],11);


// Basiskarte

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19,
attribution:'© OpenStreetMap'
}
).addTo(map);


// Kreisgrenze laden

fetch("data/kreis-herford.geojson")
.then(r=>r.json())
.then(data=>{

var kreis=L.geoJSON(data,{
style:{
color:"#c4001a",
weight:4,
fill:false
}
}).addTo(map);

map.fitBounds(kreis.getBounds());

});


// Gemeindegrenzen + Labels

fetch("data/gemeinden-herford.geojson")
.then(r=>r.json())
.then(data=>{

L.geoJSON(data,{

style:{
color:"#c4001a",
weight:1,
opacity:0.5,
fill:false
},

onEachFeature:function(feature,layer){

var name=feature.properties.name;

layer.bindTooltip(name,{
permanent:true,
direction:"center",
className:"label-gemeinde"
});

}

}).addTo(map);

});


// Beispiel Verkehrsmeldungen

var meldungen=[

{lat:52.202,lon:8.586,text:"Baustelle Bünde"},
{lat:52.181,lon:8.709,text:"Unfall Löhne"},
{lat:52.114,lon:8.673,text:"Gefahr Herford"}

];


// Marker im NW-Rot

meldungen.forEach(m=>{

L.circleMarker([m.lat,m.lon],{

radius:7,
color:"#c4001a",
fillColor:"#c4001a",
fillOpacity:1,
weight:1

})
.addTo(map)
.bindPopup(m.text);

});

</script>

</body>
</html>
