<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Verkehr im Kreis Herford</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
}

#map{
height:100vh;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// Karte

var map = L.map('map').setView([52.114,8.673],11);

// Basemap

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19,
attribution:'© OpenStreetMap'
}
).addTo(map);


// Kreisgrenze

fetch("data/kreis-herford.geojson")
.then(r=>r.json())
.then(data=>{

var kreis=L.geoJSON(data,{
style:{
color:"#c4001a",
weight:4,
fill:false
}
}).addTo(map);

map.fitBounds(kreis.getBounds());

});


// Gemeindegrenzen

fetch("data/gemeinden-herford.geojson")
.then(r=>r.json())
.then(data=>{

L.geoJSON(data,{
style:{
color:"#c4001a",
weight:1,
opacity:0.6,
fill:false
}
}).addTo(map);

});


// Beispiel Marker im NW-Rot

var meldungen=[
{lat:52.202,lon:8.586,text:"Baustelle Bünde"},
{lat:52.181,lon:8.709,text:"Unfall Löhne"},
{lat:52.114,lon:8.673,text:"Gefahr Herford"}
];


meldungen.forEach(m=>{

L.circleMarker([m.lat,m.lon],{

radius:7,
color:"#c4001a",
fillColor:"#c4001a",
fillOpacity:1,
weight:1

})
.addTo(map)
.bindPopup(m.text);

});

</script>

</body>
</html>
