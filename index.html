<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Verkehrsinfos im Kreis Herford</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f5f5f5;
}

.header{
padding:12px 16px;
background:white;
border-bottom:2px solid #c4001a;
font-weight:bold;
font-size:18px;
}

#map{
height:82vh;
width:100%;
}

.emoji-marker{
font-size:32px;
text-align:center;
line-height:32px;
}

@media(max-width:600px){

.header{
font-size:16px;
}

#map{
height:88vh;
}

}

</style>

</head>

<body>

<div class="header">
Verkehrsinfos im Kreis Herford
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>

// Karte starten
const map = L.map("map",{zoomControl:true})
.setView([52.114,8.673],11)


// Basiskarte
L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
maxZoom:19,
attribution:"© OpenStreetMap"
}
).addTo(map)


// Emoji Icons
function emojiIcon(emoji){
return L.divIcon({
className:'emoji-marker',
html:emoji,
iconSize:[36,36],
iconAnchor:[18,18]
})
}


// Cluster Layer
const constructionLayer = L.markerClusterGroup()
const accidentLayer = L.markerClusterGroup()
const warningLayer = L.markerClusterGroup()
const trafficLayer = L.markerClusterGroup()


let kreisFeature


// Kreis laden
fetch("data/kreis-herford.geojson")
.then(r=>r.json())
.then(data=>{

kreisFeature=data.features[0]


// Kreis anzeigen
L.geoJSON(data,{
style:{
color:"#c4001a",
weight:3,
fill:false
}
}).addTo(map)


// Maske erstellen
const world=turf.bboxPolygon([-180,-90,180,90])
const mask=turf.difference(world,kreisFeature)

L.geoJSON(mask,{
style:{
fillColor:"#000",
fillOpacity:0.55,
stroke:false
}
}).addTo(map)


// Verkehr laden
loadTraffic()

})


// prüfen ob Punkt im Kreis
function insideKreis(lat,lon){

const point=turf.point([lon,lat])

return turf.booleanPointInPolygon(point,kreisFeature)

}


// Marker hinzufügen
function addMarker(layer,lat,lon,emoji,text){

if(!insideKreis(lat,lon)) return

const marker=L.marker([lat,lon],{
icon:emojiIcon(emoji)
})

marker.bindPopup(text)

layer.addLayer(marker)

}


// Verkehrsdaten laden
function loadTraffic(){

fetch("data/traffic.json")
.then(r=>r.json())
.then(data=>{

data.features.forEach(f=>{

const lat=f.geometry.coordinates[1]
const lon=f.geometry.coordinates[0]

const type=f.properties.type
const text=f.properties.title


if(type==="construction")
addMarker(constructionLayer,lat,lon,"🚧",text)

else if(type==="accident")
addMarker(accidentLayer,lat,lon,"🚓",text)

else if(type==="traffic")
addMarker(trafficLayer,lat,lon,"🚗",text)

else
addMarker(warningLayer,lat,lon,"⚠️",text)

})

})

}


// Layer anzeigen
constructionLayer.addTo(map)
accidentLayer.addTo(map)
warningLayer.addTo(map)
trafficLayer.addTo(map)


const overlays={
"🚧 Baustellen":constructionLayer,
"🚓 Unfälle":accidentLayer,
"⚠️ Gefahren":warningLayer,
"🚗 Verkehr":trafficLayer
}

L.control.layers(null,overlays).addTo(map)

</script>

</body>
</html>
