<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Verkehrsinfos im Kreis Herford</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f5f5f5;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 16px;
background:white;
border-bottom:2px solid #c4001a;
}

.header h1{
font-size:18px;
margin:0;
}

.logo img{
height:32px;
}

.container{
padding:10px;
}

.mapbox{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

#map{
height:70vh;
min-height:420px;
}

.leaflet-control-zoom a{
font-size:20px;
}

@media(max-width:600px){

.header h1{
font-size:16px;
}

#map{
height:75vh;
}

}

</style>

</head>

<body>

<div class="header">

<h1>Verkehrsinfos im Kreis Herford</h1>

<div class="logo">
<img src="https://www.nw.de/_em_daten/locals/module/nw/_includes/twig/current/public/images/nw-logo-wortmarke.svg">
</div>

</div>

<div class="container">

<div class="mapbox">
<div id="map"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map=L.map("map",{zoomControl:true})
.setView([52.114,8.673],11);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
maxZoom:19,
attribution:"© OpenStreetMap"
}
).addTo(map);


// Verkehrsmarker laden

fetch("data/traffic.json")
.then(r=>r.json())
.then(data=>{

L.geoJSON(data,{

pointToLayer:function(feature,latlng){

return L.circleMarker(latlng,{
radius:7,
color:"#c4001a",
fillColor:"#c4001a",
fillOpacity:1
});

},

onEachFeature:function(feature,layer){

layer.bindPopup(feature.properties.title);

}

}).addTo(map);

});

</script>

</body>
</html>
