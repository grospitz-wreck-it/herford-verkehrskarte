<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Verkehrsinfos im Kreis Herford</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f4f4f4;
}

.header{
padding:14px;
font-size:18px;
font-weight:bold;
background:white;
border-bottom:3px solid #c4001a;
}

#map{
height:85vh;
width:100%;
}

.emoji-marker{
font-size:30px;
text-align:center;
}

</style>

</head>

<body>

<div class="header">
Verkehrsinfos im Kreis Herford
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>

const map = L.map("map").setView([52.114,8.673],11)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{ attribution:"© OpenStreetMap" }
).addTo(map)

const constructionLayer=L.markerClusterGroup()
const accidentLayer=L.markerClusterGroup()
const warningLayer=L.markerClusterGroup()

constructionLayer.addTo(map)
accidentLayer.addTo(map)
warningLayer.addTo(map)

let kreis

function emojiIcon(e){
return L.divIcon({
className:'emoji-marker',
html:e,
iconSize:[30,30]
})
}

fetch("data/kreis-herford.geojson")
.then(r=>r.json())
.then(data=>{

kreis=data.features[0]

L.geoJSON(data,{
style:{color:"#c4001a",weight:3}
}).addTo(map)

map.fitBounds(L.geoJSON(data).getBounds())

createMask(data)

loadTraffic()

loadOSM()

})


function createMask(data){

const bounds=[[-90,-180],[-90,180],[90,180],[90,-180]]

L.polygon([
bounds,
data.features[0].geometry.coordinates[0]
],{
fillColor:"#000",
fillOpacity:0.5,
stroke:false
}).addTo(map)

}


function insideKreis(lat,lon){

const pt=turf.point([lon,lat])

return turf.booleanPointInPolygon(pt,kreis)

}


function addMarker(layer,lat,lon,emoji,text){

if(!insideKreis(lat,lon)) return

const m=L.marker([lat,lon],{icon:emojiIcon(emoji)})

m.bindPopup(text)

layer.addLayer(m)

}


function loadTraffic(){

fetch("data/traffic.json")
.then(r=>r.json())
.then(data=>{

data.features.forEach(f=>{

const lat=f.geometry.coordinates[1]
const lon=f.geometry.coordinates[0]

const type=f.properties.type
const text=f.properties.title

if(type==="construction")
addMarker(constructionLayer,lat,lon,"🚧",text)

else if(type==="accident")
addMarker(accidentLayer,lat,lon,"🚓",text)

else
addMarker(warningLayer,lat,lon,"⚠️",text)

})

})

}


function loadOSM(){

const query=`

[out:json];

(

way["highway"="construction"](52.05,8.45,52.25,8.85);

node["highway"="construction"](52.05,8.45,52.25,8.85);

);

out center;

`

fetch("https://overpass-api.de/api/interpreter",{
method:"POST",
body:query
})
.then(r=>r.json())
.then(data=>{

data.elements.forEach(el=>{

let lat,lon

if(el.lat){
lat=el.lat
lon=el.lon
}

if(el.center){
lat=el.center.lat
lon=el.center.lon
}

addMarker(constructionLayer,lat,lon,"🚧","Baustelle")

})

})

}

</script>

</body>
</html>
