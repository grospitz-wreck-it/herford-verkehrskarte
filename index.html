<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Verkehrsinfos im Kreis Herford</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f5f5f5;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 16px;
background:white;
border-bottom:2px solid #c4001a;
}

.header h1{
font-size:18px;
margin:0;
}

.logo img{
height:32px;
}

.container{
padding:10px;
}

.mapbox{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

#map{
height:75vh;
min-height:420px;
width:100%;
}

.emoji-marker{
font-size:32px;
text-align:center;
line-height:32px;
}

@media(max-width:600px){

.header h1{
font-size:16px;
}

#map{
height:80vh;
}

}

</style>

</head>

<body>

<div class="header">

<h1>Verkehrsinfos im Kreis Herford</h1>

<div class="logo">
<img src="https://www.nw.de/_em_daten/locals/module/nw/_includes/twig/current/public/images/nw-logo-wortmarke.svg">
</div>

</div>

<div class="container">
<div class="mapbox">
<div id="map"></div>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

// Karte starten
const map = L.map("map",{zoomControl:true})
.setView([52.114,8.673],11)


// Basiskarte
L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
maxZoom:19,
attribution:"© OpenStreetMap"
}
).addTo(map)


// Emoji Icon Generator
function emojiIcon(emoji){
return L.divIcon({
className:'emoji-marker',
html:emoji,
iconSize:[36,36],
iconAnchor:[18,18]
})
}


// Markercluster Layer
const policeLayer = L.markerClusterGroup()
const constructionLayer = L.markerClusterGroup()
const warningLayer = L.markerClusterGroup()
const trafficLayer = L.markerClusterGroup()


// Marker hinzufügen
function addMarker(layer, lat, lon, emoji, text){

const marker = L.marker([lat,lon],{
icon:emojiIcon(emoji)
})

marker.bindPopup(text)

layer.addLayer(marker)

}


// Kreis laden
let kreisGeo

fetch("data/kreis-herford.geojson")
.then(r=>r.json())
.then(data=>{

kreisGeo=data

const kreisLayer=L.geoJSON(data,{
style:{
color:"#c4001a",
weight:3,
fill:false
}
}).addTo(map)

map.fitBounds(kreisLayer.getBounds())


// Maske außerhalb Kreis
const world={
"type":"Feature",
"geometry":{
"type":"Polygon",
"coordinates":[[
[-180,-90],
[-180,90],
[180,90],
[180,-90],
[-180,-90]
]]
}
}

const mask={
"type":"FeatureCollection",
"features":[
world,
data.features[0]
]
}

L.geoJSON(mask,{
style:{
fillColor:"#000",
fillOpacity:0.35,
stroke:false
}
}).addTo(map)

})


// Verkehrsdaten laden
fetch("data/traffic.json")
.then(r=>r.json())
.then(data=>{

data.features.forEach(f=>{

const lat=f.geometry.coordinates[1]
const lon=f.geometry.coordinates[0]

const type=f.properties.type
const text=f.properties.title

if(type==="construction"){
addMarker(constructionLayer,lat,lon,"🚧",text)
}

else if(type==="accident"){
addMarker(policeLayer,lat,lon,"🚓",text)
}

else if(type==="traffic"){
addMarker(trafficLayer,lat,lon,"🚗",text)
}

else{
addMarker(warningLayer,lat,lon,"⚠️",text)
}

})

})


// Layer zur Karte
policeLayer.addTo(map)
constructionLayer.addTo(map)
warningLayer.addTo(map)
trafficLayer.addTo(map)


// Layer Control
const overlayMaps = {
"🚓 Polizei": policeLayer,
"🚧 Baustellen": constructionLayer,
"⚠️ Gefahren": warningLayer,
"🚗 Stau": trafficLayer
}

L.control.layers(null, overlayMaps).addTo(map)

</script>

</body>
</html>
