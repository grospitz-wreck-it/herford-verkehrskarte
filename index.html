<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Emoji Verkehrskarte</title>

<link
 rel="stylesheet"
 href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

html, body {
  margin:0;
  padding:0;
}

#map {
  height:100vh;
}

.emoji-marker {
  font-size:32px;
  text-align:center;
}

</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// Karte starten
const map = L.map('map').setView([52.52, 13.405], 12)

// Basiskarte
L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    attribution:'© OpenStreetMap'
  }
).addTo(map)


// Emoji Marker Funktion
function emojiMarker(emoji) {

  return L.divIcon({
    className:'emoji-marker',
    html:emoji,
    iconSize:[30,30],
    iconAnchor:[15,15]
  })

}


// Marker setzen

L.marker([52.52,13.405], {icon:emojiMarker("🚓")})
  .addTo(map)
  .bindPopup("Polizei")

L.marker([52.525,13.39], {icon:emojiMarker("🚧")})
  .addTo(map)
  .bindPopup("Baustelle")

L.marker([52.515,13.41], {icon:emojiMarker("⚠️")})
  .addTo(map)
  .bindPopup("Gefahr")

L.marker([52.53,13.42], {icon:emojiMarker("🚗")})
  .addTo(map)
  .bindPopup("Stau")

</script>

</body>
</html>
